# SFDT for Salesforce — composite GitHub Action.
#
# Runs any sfdt CLI command in a workflow step, with optional org
# authentication handled for you:
#
#   - uses: scoobydrew83/sfdt@v0
#     with:
#       args-json: '["deploy","--smart","--org","ci","--delta-base","origin/main","--dry-run"]'
#       auth-method: sfdx-url
#       sfdx-auth-url: ${{ secrets.SFDX_AUTH_URL }}
#       org-alias: ci
#
# args-json is the preferred interface: a JSON array of arguments spawned
# directly (no shell), so quoting, spaces, and untrusted values can't be
# interpreted as shell syntax. The legacy `command` string input is deprecated:
# without allow-shell-command it accepts only shell-neutral characters and is
# word-split without a shell; with allow-shell-command: true it keeps the old
# eval behavior — never pass untrusted input to it in that mode.
#
# Pinning the action tag pins the CLI: cli-version defaults to "auto", which
# resolves the version shipped in this repository at the pinned ref. Secrets
# must be passed as expressions (never literals).
name: SFDT for Salesforce
description: >-
  Run any sfdt command in one step — smart delta deploys, org monitoring,
  quality analysis, and Salesforce release management.
author: sfdt
branding:
  icon: cloud
  color: blue

inputs:
  args-json:
    description: >-
      The sfdt arguments as a JSON array of strings, e.g.
      '["deploy","--smart","--org","ci","--dry-run"]'. Spawned directly with
      no shell — the safe interface. Exactly one of args-json / command is
      required.
    required: false
  command:
    description: >-
      DEPRECATED — prefer args-json. The sfdt command line to run (everything
      after "sfdt"). Without allow-shell-command it accepts only shell-neutral
      characters (letters, digits, space, and _@%+=:,./-) and runs without a
      shell; anything else (quotes, $, ;, |, newlines, …) is rejected.
    required: false
  allow-shell-command:
    description: >-
      Set "true" to run the command input through a shell (legacy eval
      behavior) when it needs quoting or expansion. Only for fully trusted,
      static strings — never workflow-interpolated user input. Removed in v1.
    required: false
    default: 'false'
  cli-version:
    description: >-
      @sfdt/cli version to install. "auto" (default) uses the version shipped
      at the action ref you pinned; "latest" or an exact semver also work.
    required: false
    default: auto
  auth-method:
    description: >-
      Org authentication handled by the action: "none" (default — the job is
      already authenticated), "sfdx-url", or "jwt".
    required: false
    default: none
  sfdx-auth-url:
    description: Sfdx auth URL for auth-method sfdx-url (pass a secret).
    required: false
  consumer-key:
    description: Connected app consumer key (client id) for auth-method jwt (pass a secret).
    required: false
  jwt-secret-key:
    description: Contents of the JWT signing private key for auth-method jwt (pass a secret), not a file path.
    required: false
  username:
    description: Username to authenticate as for auth-method jwt.
    required: false
  instance-url:
    description: Login URL for auth-method jwt.
    required: false
    default: https://login.salesforce.com
  org-alias:
    description: Alias assigned to the authenticated org (also set as the default org).
    required: false
    default: ci-org
  node-version:
    description: Node.js version to set up (@sfdt/cli requires >= 22.15).
    required: false
    default: '22'

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        AUTH_METHOD: ${{ inputs.auth-method }}
        SFDT_ARGS_JSON: ${{ inputs.args-json }}
        SFDT_COMMAND: ${{ inputs.command }}
      run: |
        case "$AUTH_METHOD" in
          none|sfdx-url|jwt) ;;
          *) echo "auth-method must be one of: none, sfdx-url, jwt (got: $AUTH_METHOD)" >&2; exit 1 ;;
        esac
        if [ -z "$SFDT_ARGS_JSON" ] && [ -z "$SFDT_COMMAND" ]; then
          echo "::error::one of args-json or command is required"; exit 1
        fi
        if [ -n "$SFDT_ARGS_JSON" ] && [ -n "$SFDT_COMMAND" ]; then
          echo "::error::args-json and command are mutually exclusive — pass exactly one"; exit 1
        fi

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Salesforce CLI
      shell: bash
      run: command -v sf >/dev/null 2>&1 || npm install --global @salesforce/cli

    - name: Install sfdt CLI
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli-version }}
      run: |
        NODE_MAJOR=$(node -p "process.versions.node.split('.')[0]")
        if [ "$NODE_MAJOR" -lt 22 ]; then
          echo "::error::@sfdt/cli requires Node.js >= 22.15 (node:sqlite) — set the node-version input to 22 or newer (got $(node --version))"
          exit 1
        fi
        VERSION="$CLI_VERSION"
        if [ "$VERSION" = "auto" ]; then
          # Locate this action's own checkout to pin the CLI to the pinned ref.
          # github.action_path is reliable for remote refs (owner/repo@tag) but
          # empty or wrong for local `uses: ./` invocations (actions/runner
          # #716/#2185/#2473), where the action IS the workspace — hence the chain.
          ACTION_DIR="${{ github.action_path }}"
          [ -n "$ACTION_DIR" ] && [ -f "$ACTION_DIR/package.json" ] || ACTION_DIR="${GITHUB_ACTION_PATH:-}"
          [ -n "$ACTION_DIR" ] && [ -f "$ACTION_DIR/package.json" ] || ACTION_DIR="${GITHUB_WORKSPACE:-}"
          if [ -n "$ACTION_DIR" ] && [ -f "$ACTION_DIR/package.json" ]; then
            VERSION=$(node -p "require('$ACTION_DIR/package.json').version")
          else
            echo "::warning::cli-version auto could not locate the action's package.json — using latest"
            VERSION=latest
          fi
        fi
        echo "Resolved @sfdt/cli version: $VERSION"
        if [ "$VERSION" != "latest" ] && command -v sfdt >/dev/null 2>&1 && [ "$(sfdt --version 2>/dev/null)" = "$VERSION" ]; then
          echo "@sfdt/cli@${VERSION} already installed — skipping."
        else
          npm install --global "@sfdt/cli@${VERSION}"
        fi

    - name: Authenticate (sfdx auth URL)
      if: inputs.auth-method == 'sfdx-url'
      shell: bash
      env:
        SFDX_AUTH_URL: ${{ inputs.sfdx-auth-url }}
        ORG_ALIAS: ${{ inputs.org-alias }}
      run: |
        if [ -z "$SFDX_AUTH_URL" ]; then
          echo "auth-method sfdx-url requires the sfdx-auth-url input (pass a secret)" >&2
          exit 1
        fi
        echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --alias "$ORG_ALIAS" --set-default

    - name: Authenticate (JWT)
      if: inputs.auth-method == 'jwt'
      shell: bash
      env:
        SFDX_CONSUMER_KEY: ${{ inputs.consumer-key }}
        SFDX_JWT_SECRET_KEY: ${{ inputs.jwt-secret-key }}
        SFDX_USERNAME: ${{ inputs.username }}
        SFDX_INSTANCE_URL: ${{ inputs.instance-url }}
        ORG_ALIAS: ${{ inputs.org-alias }}
      run: |
        if [ -z "$SFDX_CONSUMER_KEY" ] || [ -z "$SFDX_JWT_SECRET_KEY" ] || [ -z "$SFDX_USERNAME" ]; then
          echo "auth-method jwt requires the consumer-key, jwt-secret-key, and username inputs (pass secrets)" >&2
          exit 1
        fi
        KEY_FILE="${RUNNER_TEMP}/server.key"
        trap 'rm -f "$KEY_FILE"' EXIT
        printf '%s\n' "$SFDX_JWT_SECRET_KEY" > "$KEY_FILE"
        sf org login jwt --client-id "$SFDX_CONSUMER_KEY" --jwt-key-file "$KEY_FILE" --username "$SFDX_USERNAME" --instance-url "${SFDX_INSTANCE_URL:-https://login.salesforce.com}" --alias "$ORG_ALIAS" --set-default

    - name: Run sfdt
      shell: bash
      env:
        SFDT_ARGS_JSON: ${{ inputs.args-json }}
        SFDT_COMMAND: ${{ inputs.command }}
        SFDT_ALLOW_SHELL: ${{ inputs.allow-shell-command }}
      run: |
        if [ -n "$SFDT_ARGS_JSON" ]; then
          # Preferred path: JSON array of args passed as a bash argv — the
          # values never touch shell parsing, so nothing in them can be
          # interpreted as shell syntax. jq is preinstalled on hosted runners.
          if ! jq -e 'type=="array" and length>0 and all(.[]; type=="string")' >/dev/null 2>&1 <<<"$SFDT_ARGS_JSON"; then
            echo "::error::args-json must be a non-empty JSON array of strings"; exit 1
          fi
          if jq -e 'any(.[]; test("\n"))' >/dev/null <<<"$SFDT_ARGS_JSON"; then
            echo "::error::args-json values must not contain newlines"; exit 1
          fi
          readarray -t SFDT_ARGS < <(jq -r '.[]' <<<"$SFDT_ARGS_JSON")
          sfdt "${SFDT_ARGS[@]}"
        elif [ "$SFDT_ALLOW_SHELL" = "true" ]; then
          echo "::warning::command with allow-shell-command runs through a shell (legacy eval) — migrate to args-json; this mode is removed in v1"
          eval "sfdt ${SFDT_COMMAND}"
        else
          # Deprecated string path, hardened: reject newlines and anything
          # outside a shell-neutral charset, then word-split WITHOUT a shell.
          case "$SFDT_COMMAND" in
            *$'\n'*)
              echo "::error::the command input must not contain newlines — use args-json"; exit 1 ;;
          esac
          if printf '%s' "$SFDT_COMMAND" | LC_ALL=C grep -q '[^A-Za-z0-9 _@%+=:,./-]'; then
            echo "::error::the command input contains shell-special characters (quotes, \$, ;, |, …). Use args-json (a JSON array, executed with no shell) — or set allow-shell-command: true only for a fully trusted static string."
            exit 1
          fi
          echo "::notice::the command input is deprecated — prefer args-json (executed without a shell)"
          read -r -a SFDT_ARGS <<< "$SFDT_COMMAND"
          sfdt "${SFDT_ARGS[@]}"
        fi
