name: Docker Publish

# Builds the official multi-arch image and pushes it to GHCR.
#
# - On every published GitHub Release tagged `v*` (a CLI release), builds that tag.
# - On manual dispatch, builds the current branch (use this to (re)publish a
#   specific version, e.g. after a Dockerfile fix that didn't ride a version bump).
#
# Split out of ci.yml so it can be re-run on demand — a build failure no longer
# requires a fresh version bump to retry.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 0.14.0). Defaults to package.json version.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  docker-publish:
    # For releases, only CLI tags (`v*`) — skip ext-v* / vscode-v* releases.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/scoobydrew83/sfdt
    steps:
      - uses: actions/checkout@v7
        with:
          # release: build the released tag; dispatch: build the branch it ran on.
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Resolve + validate version
        id: ver
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION="${RELEASE_TAG#v}"
          elif [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          # Guard against anything unexpected reaching the image tag.
          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$'; then
            echo "Refusing to publish: invalid version '${VERSION}'"; exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing image version ${VERSION}"

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
