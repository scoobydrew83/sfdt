name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REF: ${{ github.repository }}/pull/${{ github.event.pull_request.number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Broad `gh pr:*` / comment-tool coverage on purpose: the code-review
          # plugin is installed unpinned from the marketplace on every run, and
          # a narrower list drifted out from under it — the reviewer ran but all
          # posting calls were permission-denied (50 denials, "No buffered
          # inline comments"), so reviews silently stopped appearing on PRs.
          claude_args: "--allowedTools 'mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(gh pr:*),Bash(gh issue:*),Bash(gh search:*),Bash(gh api:*),Bash(git diff:*),Bash(git log:*),Read,Glob,Grep'"
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            Run /code-review:code-review --comment on this pull request (${{ github.repository }}/pull/${{ github.event.pull_request.number }}).

            The skill handles posting on its own (inline comments via the github_inline_comment MCP tool, summary via `gh pr comment`). Do not call `gh pr review` and do not post any file contents (CLAUDE.md, README.md, CHANGELOG.md, etc.) as a comment body — only the review findings produced by the skill.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
