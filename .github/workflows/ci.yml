name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm publish --dry-run

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check for version bump
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags — first publish"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "v${PACKAGE_VERSION}" != "$LATEST_TAG" ]; then
            echo "Version bump detected: ${LATEST_TAG} → v${PACKAGE_VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change (${LATEST_TAG})"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${RELEASE_VERSION}" -m "Release ${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"
      - run: npm ci
        if: steps.version.outputs.changed == 'true'
      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npx npm@latest publish --provenance --access public
      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${VERSION}" --generate-notes
