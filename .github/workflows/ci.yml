name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'    # 2am UTC nightly
  workflow_dispatch: {}    # manual on-demand integration smoke

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Security audit
        # Runtime deps only (--omit=dev): high-severity advisories in build tooling
        # (e.g. wxt -> web-ext-run -> firefox-profile -> adm-zip, and wxt's esbuild)
        # never ship in any published artifact and can't be forward-fixed while wxt is
        # at its latest version. The weekly scheduled-audit.yml still reports dev
        # advisories at moderate so they stay visible for when an upstream fix lands.
        run: npm audit --audit-level=high --omit=dev
      - run: npm run lint
      - run: npm test
      - name: Surface contracts (catalog drift + license/node/auth consistency)
        run: npm run check:all-contracts
      - name: Build @sfdt/plugin (codegen + tsc — catches CLI command-tree drift)
        run: npm run build:plugin
      - name: Publish dry-run
        run: npm publish --dry-run
      - name: Publish dry-run @sfdt/plugin
        run: npm publish --dry-run --workspace=@sfdt/plugin

  gui-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      # The GUI imports @sfdt/flow-core, whose package `exports` resolve to its
      # compiled dist/. Build flow-core first or `vite build` can't resolve it.
      - name: Build @sfdt/flow-core (GUI build dependency)
        run: npm run build:flow-core
      - name: Test GUI
        run: npm test --workspace=gui
      - name: Build GUI
        run: npm run build --workspace=gui

  # Gate: skip the live integration smoke gracefully when the DevHub auth
  # secret isn't configured, so the job is a no-op (not a failure) until a
  # maintainer adds SFDX_AUTH_URL + SF_DEVHUB_USERNAME.
  #
  # Runs on the nightly schedule and manual dispatch ONLY — never per push.
  # Creating a scratch org on every develop push exhausts the Dev Hub's daily
  # scratch-org allocation; a once-nightly smoke (plus on-demand) is enough.
  # (schedule/workflow_dispatch never carry a pull_request context, so fork PRs
  # still never see the secrets.)
  integration-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          if [ -n "$SFDX_AUTH_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Live integration smoke skipped — set the SFDX_AUTH_URL and SF_DEVHUB_USERNAME secrets (and the 'integration' environment) to enable it."
          fi

  # Tier 2 live smoke against a real Dev Hub: create a scratch org, run the
  # deploy/test/audit/versions/drift/rollback cycle against it, always delete.
  # Behind the protected 'integration' environment and gated on secrets being
  # present, on develop only.
  integration:
    needs: [test, gui-build, integration-gate]
    if: needs.integration-gate.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment: integration
    permissions:
      contents: read
    env:
      SF_USERNAME: ${{ secrets.SF_DEVHUB_USERNAME }}
      SF_CONTAINER_MODE: 'true'
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build @sfdt/flow-core (CLI runtime dep)
        run: npm run build:flow-core
      - name: Pack @sfdt/flow-core and @sfdt/cli
        # @sfdt/cli declares @sfdt/flow-core@^0.9.0 as a runtime dep. On a commit
        # where flow-core is not yet on the public npm registry, the CLI tarball
        # install would 404. Packing flow-core alongside and installing both at
        # once keeps the integration job self-contained.
        run: |
          npm pack --workspace=@sfdt/flow-core
          npm pack
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli
      - name: Install sfdt globally from packed tarballs
        # Install flow-core first so npm's local cache satisfies @sfdt/cli's
        # runtime dep without hitting the registry. Explicit filenames so the
        # glob doesn't double-list flow-core.
        run: npm install -g sfdt-flow-core-*.tgz sfdt-cli-*.tgz
      - name: Checkout synthetic-spark fixture
        uses: actions/checkout@v7
        with:
          repository: scoobydrew83/synthetic-spark
          path: synthetic-spark
      - name: Authenticate Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          printf '%s' "$SFDX_AUTH_URL" > auth_url.txt
          sf org login sfdx-url --sfdx-url-file auth_url.txt --set-default-dev-hub
          rm -f auth_url.txt
      - name: Run integration smoke (scratch org create → cycle → always-delete)
        run: ./scripts/integration/run-integration-tests.sh ./synthetic-spark

  publish-beta:
    needs: [test, gui-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: beta
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Check for pre-release version bump
        id: version
        run: |
          CURR_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "0.0.0")
          echo "Current: v${CURR_VERSION}, Previous: v${PREV_VERSION}"
          if [ "${CURR_VERSION}" != "${PREV_VERSION}" ] && [[ "${CURR_VERSION}" == *"-"* ]]; then
            echo "Pre-release bump: v${PREV_VERSION} -> v${CURR_VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pre-release bump detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${CURR_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create pre-release git tag
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d "v${RELEASE_VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/v${RELEASE_VERSION}" 2>/dev/null || true
          git tag -a "v${RELEASE_VERSION}" -m "Pre-release v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"
      - run: npm ci
        if: steps.version.outputs.changed == 'true'
      - name: Build GUI
        if: steps.version.outputs.changed == 'true'
        run: npm run build:gui
      - name: Pin npm for OIDC trusted publishing
        # This repo publishes via npm OIDC trusted publishing (no token) + provenance.
        # That needs npm >= 11.5.1; the runner's bundled npm 10.x can't (ENEEDAUTH).
        # `npm@latest` is currently the broken 12.0.0 (missing `sigstore`, so
        # --provenance crashes), so pin the newest stable 11.x. Bump deliberately —
        # never a floating `@latest`.
        if: steps.version.outputs.changed == 'true'
        run: npm install -g npm@11.18.0
      - name: Publish @sfdt/flow-core beta to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --workspace=@sfdt/flow-core --provenance --access public --tag beta
      - name: Publish @sfdt/cli beta to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public --tag beta
      - name: Publish @sfdt/plugin beta to npm
        # Thin sf-CLI wrapper; published AFTER the CLI so its @sfdt/cli dep
        # resolves. prepack builds dist/ + oclif.manifest.json.
        if: steps.version.outputs.changed == 'true'
        run: npm publish --workspace=@sfdt/plugin --provenance --access public --tag beta
      - name: Create GitHub Pre-Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${VERSION}" --generate-notes --prerelease


  publish:
    needs: [test, gui-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: write
      id-token: write
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Check for version bump
        id: version
        run: |
          CURR_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "0.0.0")
          # What's on npm now — lets a failed publish self-heal on the next push
          # to main instead of only firing on a HEAD~1 version diff (a broken
          # publish tool once left the tag pushed but nothing on npm).
          NPM_VERSION=$(npm view @sfdt/cli version 2>/dev/null || echo "none")
          echo "package.json: v${CURR_VERSION} · previous commit: v${PREV_VERSION} · npm latest: v${NPM_VERSION}"
          # Refuse to publish a prerelease version as latest from main
          if [[ "${CURR_VERSION}" == *"-"* ]]; then
            echo "ERROR: prerelease version ${CURR_VERSION} must not be published from main (use develop instead)"
            exit 1
          fi
          if [ "${CURR_VERSION}" != "${PREV_VERSION}" ] || [ "${CURR_VERSION}" != "${NPM_VERSION}" ]; then
            echo "Publish needed: package.json v${CURR_VERSION} is not yet the npm latest (v${NPM_VERSION})."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Already published v${CURR_VERSION} to npm — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${CURR_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Remove pre-existing tag if present (e.g. created on a branch before merge)
          git tag -d "v${RELEASE_VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/v${RELEASE_VERSION}" 2>/dev/null || true
          git tag -a "v${RELEASE_VERSION}" -m "Release v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"
      - name: Update floating major tag
        # Consumers of the root composite action reference `scoobydrew83/sfdt@v0`
        # (later `@v1`, …) — keep that tag pointing at the newest stable release.
        # Stable releases only; beta publishes never move it.
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          MAJOR="v${RELEASE_VERSION%%.*}"
          git tag -f "$MAJOR" "v${RELEASE_VERSION}"
          git push -f origin "$MAJOR"
      - run: npm ci
        if: steps.version.outputs.changed == 'true'
      - name: Build GUI
        if: steps.version.outputs.changed == 'true'
        run: npm run build:gui
      - name: Pin npm for OIDC trusted publishing
        # This repo publishes via npm OIDC trusted publishing (no token) + provenance.
        # That needs npm >= 11.5.1; the runner's bundled npm 10.x can't (ENEEDAUTH).
        # `npm@latest` is currently the broken 12.0.0 (missing `sigstore`, so
        # --provenance crashes), so pin the newest stable 11.x. Bump deliberately —
        # never a floating `@latest`.
        if: steps.version.outputs.changed == 'true'
        run: npm install -g npm@11.18.0
      - name: Publish @sfdt/flow-core to npm
        # Must publish flow-core BEFORE @sfdt/cli — the CLI depends on it as
        # a regular runtime dep. The workspace's prepack hook builds dist/
        # before packing. Idempotent: a "you cannot publish over previously
        # published version" error from npm is acceptable on republish.
        if: steps.version.outputs.changed == 'true'
        run: |
          npm publish --workspace=@sfdt/flow-core --provenance --access public || {
            EXIT=$?
            if npm view @sfdt/flow-core@$(node -p "require('./packages/flow-core/package.json').version") >/dev/null 2>&1; then
              echo "flow-core version already published — continuing"
            else
              exit $EXIT
            fi
          }
      - name: Publish @sfdt/cli to npm
        if: steps.version.outputs.changed == 'true'
        # Idempotent (like flow-core/plugin): if publish fails but the version is
        # already on npm, keep going — supports the self-healing re-run above.
        run: |
          npm publish --provenance --access public || {
            EXIT=$?
            if npm view @sfdt/cli@$(node -p "require('./package.json').version") >/dev/null 2>&1; then
              echo "cli version already published — continuing"
            else
              exit $EXIT
            fi
          }
      - name: Publish @sfdt/plugin to npm
        # Thin sf-CLI wrapper. Publish AFTER @sfdt/cli so its `@sfdt/cli`
        # dependency resolves on the registry. prepack builds dist/ +
        # oclif.manifest.json. Idempotent: republishing the same version is OK.
        if: steps.version.outputs.changed == 'true'
        run: |
          npm publish --workspace=@sfdt/plugin --provenance --access public || {
            EXIT=$?
            if npm view @sfdt/plugin@$(node -p "require('./packages/plugin/package.json').version") >/dev/null 2>&1; then
              echo "plugin version already published — continuing"
            else
              exit $EXIT
            fi
          }
      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${VERSION}" --generate-notes
      - name: Bump Homebrew tap
        # Pushes the new tarball url + sha256 to the separate tap repo
        # (scoobydrew83/homebrew-sfdt). The default GITHUB_TOKEN can't write to
        # another repo, so this needs a fine-grained PAT (contents:write on the
        # tap) stored as HOMEBREW_TAP_TOKEN. Skips cleanly if the secret is unset.
        # continue-on-error: a cosmetic tap bump must never fail the release job
        # (npm/GHCR already published by this point) or block the downstream
        # `docker` job — a bad/expired PAT surfaces as a yellow step, not a red run.
        if: steps.version.outputs.changed == 'true'
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap bump (bump Formula/sfdt.rb manually)."
            exit 0
          fi
          TARBALL="https://registry.npmjs.org/@sfdt/cli/-/cli-${VERSION}.tgz"
          SHA=$(curl -fsSL "${TARBALL}" | shasum -a 256 | awk '{print $1}')
          if [ -z "${SHA}" ]; then echo "Failed to compute tarball sha256"; exit 1; fi
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/scoobydrew83/homebrew-sfdt.git" tap
          cd tap
          sed -i -E "s#(url \")[^\"]*(\")#\1${TARBALL}\2#" Formula/sfdt.rb
          sed -i -E "s#(sha256 \")[^\"]*(\")#\1${SHA}\2#" Formula/sfdt.rb
          if git diff --quiet; then
            echo "Formula already at ${VERSION} — nothing to push."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump formula to ${VERSION}"
          git push
      - name: Sync skills pack repo
        # Regenerates the standalone pack repo (scoobydrew83/sfdt-skills) that
        # backs `npx skills add scoobydrew83/sfdt-skills`. Same cross-repo
        # constraint as the tap bump above: the default GITHUB_TOKEN can't write
        # to another repo, so this needs a fine-grained PAT (contents:write on
        # sfdt-skills) stored as SKILLS_PACK_TOKEN. Skips cleanly if unset.
        # continue-on-error for the same reason as the tap: a downstream
        # distribution sync must never fail an already-published release.
        # The export only wipes skills/ in the target, so that repo's README and
        # LICENSE (which are hand-written, not generated) survive each sync.
        if: steps.version.outputs.changed == 'true'
        continue-on-error: true
        env:
          SKILLS_PACK_TOKEN: ${{ secrets.SKILLS_PACK_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${SKILLS_PACK_TOKEN}" ]; then
            echo "SKILLS_PACK_TOKEN not set — skipping skills pack sync."
            echo "Sync manually with: sfdt skills export --target pack --out ../sfdt-skills"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${SKILLS_PACK_TOKEN}@github.com/scoobydrew83/sfdt-skills.git" skills-pack
          node bin/sfdt.js skills export --target pack --out skills-pack
          cd skills-pack
          sed -i -E "s#(Synced from \`@sfdt/cli\` v)[0-9]+\.[0-9]+\.[0-9]+#\1${VERSION}#" README.md
          # manifest.json carries a generatedAt timestamp that changes on every
          # export, so diff the real content instead — otherwise a self-healing
          # re-run of an already-published version pushes a timestamp-only commit.
          if git diff --quiet -- skills README.md; then
            echo "Skills pack already current at v${VERSION} — nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Sync skills from @sfdt/cli v${VERSION}"
          git push
        # The Docker image builds via the `docker` job below, which calls the
        # reusable docker-publish.yml in this same run.

  docker:
    needs: publish
    # Only when publish actually bumped the version. Builds + pushes the
    # multi-arch GHCR image in this same run — a GITHUB_TOKEN-created release
    # does not fire docker-publish.yml's `release` trigger, so we call it
    # directly instead of relying on the release event.
    if: needs.publish.outputs.changed == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets: inherit
