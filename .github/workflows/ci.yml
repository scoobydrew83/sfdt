name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - name: Build GUI (Node 22 only)
        if: matrix.node-version == 22
        run: npm run build:gui
      - name: Publish dry-run (Node 22 only)
        if: matrix.node-version == 22
        run: npm publish --dry-run

  # ── Beta release (develop → npm@beta) ────────────────────────────────────────

  version-check-beta:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check for pre-release version bump
        id: version
        run: |
          CURR_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "0.0.0")
          echo "Current: v${CURR_VERSION}, Previous: v${PREV_VERSION}"
          if [ "${CURR_VERSION}" != "${PREV_VERSION}" ] && [[ "${CURR_VERSION}" == *"-"* ]]; then
            echo "Pre-release bump: v${PREV_VERSION} → v${CURR_VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pre-release bump detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${CURR_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create pre-release git tag
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d "v${RELEASE_VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/v${RELEASE_VERSION}" 2>/dev/null || true
          git tag -a "v${RELEASE_VERSION}" -m "Pre-release v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"

  publish-beta:
    needs: version-check-beta
    if: needs.version-check-beta.outputs.changed == 'true'
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.version-check-beta.outputs.version }}
      tag: beta
      prerelease: true
    secrets: inherit

  # ── Production release (main → npm@latest) ────────────────────────────────────

  version-check:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check for version bump
        id: version
        run: |
          CURR_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "0.0.0")
          echo "Current: v${CURR_VERSION}, Previous: v${PREV_VERSION}"
          # Refuse to publish a prerelease version as latest from main
          if [[ "${CURR_VERSION}" == *"-"* ]]; then
            echo "ERROR: prerelease version ${CURR_VERSION} must not be published from main (use develop instead)"
            exit 1
          fi
          if [ "${CURR_VERSION}" != "${PREV_VERSION}" ]; then
            echo "Version bump detected: v${PREV_VERSION} → v${CURR_VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change (${CURR_VERSION})"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${CURR_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Remove pre-existing tag if present (e.g. created on a branch before merge)
          git tag -d "v${RELEASE_VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/v${RELEASE_VERSION}" 2>/dev/null || true
          git tag -a "v${RELEASE_VERSION}" -m "Release v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"

  publish:
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.version-check.outputs.version }}
      tag: latest
      prerelease: false
    secrets: inherit
