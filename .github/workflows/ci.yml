name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'    # 2am UTC nightly

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - name: Publish dry-run
        run: npm publish --dry-run

  gui-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      # The GUI imports @sfdt/flow-core, whose package `exports` resolve to its
      # compiled dist/. Build flow-core first or `vite build` can't resolve it.
      - name: Build @sfdt/flow-core (GUI build dependency)
        run: npm run build:flow-core
      - name: Test GUI
        run: npm test --workspace=gui
      - name: Build GUI
        run: npm run build --workspace=gui

  integration:
    needs: [test, gui-build]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    env:
      SF_JWT_KEY: ${{ secrets.SF_DEVHUB_JWT_KEY }}
      SF_CLIENT_ID: ${{ secrets.SF_DEVHUB_CLIENT_ID }}
      SF_USERNAME: ${{ secrets.SF_DEVHUB_USERNAME }}
      SF_CONTAINER_MODE: true
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Build @sfdt/flow-core (CLI runtime dep)
        run: npm run build:flow-core
      - name: Pack @sfdt/flow-core and @sfdt/cli
        # @sfdt/cli declares @sfdt/flow-core@^0.9.0 as a runtime dep. On a
        # commit where flow-core is not yet on the public npm registry, the
        # CLI tarball install would 404. Packing flow-core alongside and
        # installing both at once keeps the integration job self-contained.
        run: |
          npm pack --workspace=@sfdt/flow-core
          npm pack
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli
      - name: Checkout synthetic-spark fixture
        uses: actions/checkout@v4
        with:
          repository: scoobydrew83/synthetic-spark
          path: synthetic-spark
      - name: Install sfdt globally from packed tarballs
        # Install flow-core first so npm's local cache satisfies @sfdt/cli's
        # runtime dep without hitting the registry. Explicit filenames so the
        # glob doesn't double-list flow-core.
        run: npm install -g sfdt-flow-core-*.tgz sfdt-cli-*.tgz
      - name: Authenticate DevHub
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
          sf org login sfdx-url --sfdx-url-file auth_url.txt --set-default-dev-hub
          rm auth_url.txt
      - name: Run integration tests
        run: ./scripts/integration/run-integration-tests.sh ./synthetic-spark

  publish-beta:
    needs: [test, gui-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: beta
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check for pre-release version bump
        id: version
        run: |
          CURR_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "0.0.0")
          echo "Current: v${CURR_VERSION}, Previous: v${PREV_VERSION}"
          if [ "${CURR_VERSION}" != "${PREV_VERSION}" ] && [[ "${CURR_VERSION}" == *"-"* ]]; then
            echo "Pre-release bump: v${PREV_VERSION} -> v${CURR_VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pre-release bump detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${CURR_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create pre-release git tag
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d "v${RELEASE_VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/v${RELEASE_VERSION}" 2>/dev/null || true
          git tag -a "v${RELEASE_VERSION}" -m "Pre-release v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"
      - run: npm ci
        if: steps.version.outputs.changed == 'true'
      - name: Build GUI
        if: steps.version.outputs.changed == 'true'
        run: npm run build:gui
      - name: Publish @sfdt/flow-core beta to npm
        if: steps.version.outputs.changed == 'true'
        run: npx npm@latest publish --workspace=@sfdt/flow-core --provenance --access public --tag beta
      - name: Publish @sfdt/cli beta to npm
        if: steps.version.outputs.changed == 'true'
        run: npx npm@latest publish --provenance --access public --tag beta
      - name: Create GitHub Pre-Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${VERSION}" --generate-notes --prerelease


  publish:
    needs: [test, gui-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check for version bump
        id: version
        run: |
          CURR_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "0.0.0")
          echo "Current: v${CURR_VERSION}, Previous: v${PREV_VERSION}"
          # Refuse to publish a prerelease version as latest from main
          if [[ "${CURR_VERSION}" == *"-"* ]]; then
            echo "ERROR: prerelease version ${CURR_VERSION} must not be published from main (use develop instead)"
            exit 1
          fi
          if [ "${CURR_VERSION}" != "${PREV_VERSION}" ]; then
            echo "Version bump detected: v${PREV_VERSION} → v${CURR_VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change (${CURR_VERSION})"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${CURR_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Remove pre-existing tag if present (e.g. created on a branch before merge)
          git tag -d "v${RELEASE_VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/v${RELEASE_VERSION}" 2>/dev/null || true
          git tag -a "v${RELEASE_VERSION}" -m "Release v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"
      - run: npm ci
        if: steps.version.outputs.changed == 'true'
      - name: Build GUI
        if: steps.version.outputs.changed == 'true'
        run: npm run build:gui
      - name: Publish @sfdt/flow-core to npm
        # Must publish flow-core BEFORE @sfdt/cli — the CLI depends on it as
        # a regular runtime dep. The workspace's prepack hook builds dist/
        # before packing. Idempotent: a "you cannot publish over previously
        # published version" error from npm is acceptable on republish.
        if: steps.version.outputs.changed == 'true'
        run: |
          npx npm@latest publish --workspace=@sfdt/flow-core --provenance --access public || {
            EXIT=$?
            if npm view @sfdt/flow-core@$(node -p "require('./packages/flow-core/package.json').version") >/dev/null 2>&1; then
              echo "flow-core version already published — continuing"
            else
              exit $EXIT
            fi
          }
      - name: Publish @sfdt/cli to npm
        if: steps.version.outputs.changed == 'true'
        run: npx npm@latest publish --provenance --access public
      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${VERSION}" --generate-notes
