# Generated by `sfdt ci init --provider github --type deploy`.
# Smart delta validation on pull requests: computes the changed-metadata delta
# against the PR base branch and runs a check-only deploy (no changes applied).
# Promote to a real deploy by removing --dry-run on the protected branch.
#
# Required repository secrets:
#   SFDX_AUTH_URL   sfdx auth URL for {{org}}
name: SFDT Smart Deploy
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '{{nodeVersion}}'
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli
      - name: Authenticate to {{org}}
        run: echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --alias {{org}} --set-default
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
      - name: Smart delta validation
        run: npx --yes @sfdt/cli@latest deploy --smart --org {{org}} --delta-base "origin/${{ github.event.pull_request.base.ref }}" --dry-run
