# Generated by `sfdt ci init --provider azure --type monitor`.
# A standalone Azure Pipelines definition for scheduled org monitoring.
#
# Required pipeline variables (Pipelines > Library / pipeline variables, secret):
#   SFDX_AUTH_URL, SLACK_WEBHOOK_URL (optional), TEAMS_WEBHOOK_URL (optional)
schedules:
  - cron: '{{cron}}'
    displayName: SFDT Org Monitoring
    branches:
      include:
        - main
    always: true
pool:
  vmImage: ubuntu-latest
steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '{{nodeVersion}}'
  - script: npm install --global @salesforce/cli
    displayName: Install Salesforce CLI
  - script: echo "$(SFDX_AUTH_URL)" | sf org login sfdx-url --sfdx-url-stdin --alias {{org}} --set-default
    displayName: Authenticate to {{org}}
  - script: npx --yes @sfdt/cli@latest monitor all --org {{org}} --backup --notify --json
    displayName: Run org monitoring
    env:
      SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK_URL)
      TEAMS_WEBHOOK_URL: $(TEAMS_WEBHOOK_URL)
