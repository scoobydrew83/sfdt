# Generated by `sfdt ci init --provider gitlab --type deploy`.
# Merge this job into your .gitlab-ci.yml. Runs a smart delta check-only deploy
# on merge requests (delta computed against the MR target branch).
#
# Required CI/CD variables: SFDX_AUTH_URL
sfdt-smart-deploy:
  image: node:{{nodeVersion}}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    GIT_DEPTH: 0
  script:
    - npm install --global @salesforce/cli
    - echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --alias {{org}} --set-default
    - npx --yes @sfdt/cli@latest deploy --smart --org {{org}} --delta-base "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --dry-run
