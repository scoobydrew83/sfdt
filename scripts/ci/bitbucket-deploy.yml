# Generated by `sfdt ci init --provider bitbucket --type deploy`.
# Merge this `pull-requests` pipeline into your bitbucket-pipelines.yml. Runs a
# smart delta check-only deploy on pull requests (delta vs the destination branch).
#
# Required repository variables (secured): SFDX_AUTH_URL
pipelines:
  pull-requests:
    '**':
      - step:
          name: SFDT Smart Deploy
          image: node:{{nodeVersion}}
          clone:
            depth: full
          script:
            - npm install --global @salesforce/cli
            - echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --alias {{org}} --set-default
            - npx --yes @sfdt/cli@latest deploy --smart --org {{org}} --delta-base "origin/$BITBUCKET_PR_DESTINATION_BRANCH" --dry-run
