# Generated by `sfdt ci init --provider bitbucket --type monitor`.
# Merge this `custom` pipeline into your bitbucket-pipelines.yml, then add a
# schedule (Repository settings > Pipelines > Schedules) with cron '{{cron}}'.
#
# Required repository variables (Repository settings > Pipelines > Variables, secured):
#   SFDX_AUTH_URL, SLACK_WEBHOOK_URL (optional), TEAMS_WEBHOOK_URL (optional)
pipelines:
  custom:
    sfdt-monitor:
      - step:
          name: SFDT Org Monitoring
          image: node:{{nodeVersion}}
          script:
            - npm install --global @salesforce/cli
            - echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --alias {{org}} --set-default
            - npx --yes @sfdt/cli@latest monitor all --org {{org}} --backup --notify --json
          artifacts:
            - logs/monitor-latest.json
