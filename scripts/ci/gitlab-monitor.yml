# Generated by `sfdt ci init --provider gitlab --type monitor`.
# Merge this job into your .gitlab-ci.yml, then create a pipeline schedule
# (CI/CD > Schedules) with cron '{{cron}}'.
#
# Required CI/CD variables (Settings > CI/CD > Variables, masked):
#   SFDX_AUTH_URL, SLACK_WEBHOOK_URL (optional), TEAMS_WEBHOOK_URL (optional)
sfdt-monitor:
  image: node:{{nodeVersion}}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - npm install --global @salesforce/cli
    - echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --alias {{org}} --set-default
    - npx --yes @sfdt/cli@latest monitor all --org {{org}} --backup --notify --json
  artifacts:
    when: always
    paths:
      - logs/monitor-latest.json
