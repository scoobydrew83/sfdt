name: SFDT Org Monitoring
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli
      - name: Authenticate to golden-org
        run: echo "$SFDX_AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --alias golden-org --set-default
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
      - name: Run org monitoring
        run: npx --yes @sfdt/cli@latest monitor all --org golden-org --backup --notify --json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      - name: Upload monitoring snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sfdt-monitor-snapshot
          path: logs/monitor-latest.json
          if-no-files-found: ignore
